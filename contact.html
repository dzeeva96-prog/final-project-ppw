<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - OLYMPIA GYM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="index.html">OLYMPIA GYM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link px-3" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="classes.html">Classes</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="membership.html">Membership</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="contact.html">Contact</a></li>
                </ul>
                <button class="btn btn-outline-light px-4 rounded-pill" id="darkModeToggle">Dark Mode</button>
            </div>
        </div>
    </nav>

    <main class="container py-5 my-md-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="text-center mb-5">
                    <h1 class="display-6 fw-bold">Hubungi Kami</h1>
                    <p class="text-secondary mt-2">Punya pertanyaan atau siap untuk mendaftar? Kirimkan pesan kepada tim kami.</p>
                </div>
                
                <div class="card border-0 p-4 p-md-5">
                    <form id="contactForm">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label text-secondary mb-2">Nama Lengkap</label>
                                <input type="text" id="nama" class="form-control form-control-lg bg-light border-0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary mb-2">Email Aktif</label>
                                <input type="email" id="email" class="form-control form-control-lg bg-light border-0" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-secondary mb-2">Pilih Kategori</label>
                                <select id="kategori" class="form-select form-select-lg bg-light border-0" required>
                                    <option value="" selected disabled>Pilih salah satu...</option>
                                    <option value="Pertanyaan Jadwal Kelas">Pertanyaan Jadwal Kelas</option>
                                    <option value="Kerjasama / Lainnya">Kerjasama / Lainnya</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-secondary mb-2">Pesan Anda</label>
                                <textarea id="pesan" class="form-control form-control-lg bg-light border-0" rows="4" required></textarea>
                            </div>
                            <div class="col-12 mt-5">
                                <button type="submit" class="btn btn-dark btn-lg w-100 py-3 rounded-pill fw-bold">Kirim Pesan Sekarang</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <p class="mb-0 text-white-50">&copy; 2026 OLYMPIA GYM. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
