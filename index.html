<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amikom Gym & Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">AMIKOM GYM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="classes.html">Classes</a></li>
                    <li class="nav-item"><a class="nav-link" href="membership.html">Membership</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <button class="btn btn-outline-light ms-3" id="darkModeToggle">Toggle Dark Mode</button>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="text-center">Welcome to Amikom Gym</h1>
        <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470"
            class="img-fluid rounded my-4" alt="Gym Interior">

        <div class="card p-4 my-4">
            <h3>Kalkulator BMI</h3>
            <div class="row">
                <div class="col-md-5">
                    <input type="number" id="berat" class="form-control mb-2" placeholder="Berat (kg)">
                </div>
                <div class="col-md-5">
                    <input type="number" id="tinggi" class="form-control mb-2" placeholder="Tinggi (cm)">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="hitungBMI()">Hitung</button>
                </div>
            </div>
            <p id="hasilBMI" class="mt-3 fw-bold"></p>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2026 Final Project Kelompok (Nama Kelompok). Universitas Amikom Yogyakarta.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
