<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="index.html">OLYMPIA GYM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link px-3" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="classes.html">Classes</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="membership.html">Membership</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-warning fw-semibold active" href="register.html">Register</a></li>
                </ul>
                <button class="btn btn-outline-light px-4 rounded-pill" id="darkModeToggle">Dark Mode</button>
            </div>
        </div>
    </nav>

   
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4 p-md-5 border-0 shadow-sm rounded-4">
                    <h2 class="fw-bold text-center mb-4">Buat Akun Baru</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Nama Lengkap</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0" placeholder="Masukkan nama lengkap" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Alamat Email</label>
                            <input type="email" class="form-control form-control-lg bg-light border-0" placeholder="nama@email.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Kata Sandi</label>
                            <input type="password" class="form-control form-control-lg bg-light border-0" placeholder="Buat kata sandi" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary">Konfirmasi Kata Sandi</label>
                            <input type="password" class="form-control form-control-lg bg-light border-0" placeholder="Ulangi kata sandi" required>
                        </div>
                        <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold">Daftar Sekarang</button>
                    </form>
                </div>
            </div>
        </div>
    </main>


    <footer class="bg-dark text-white text-center py-4 mt-auto">
